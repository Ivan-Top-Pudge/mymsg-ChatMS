name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Run Linter
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest

    - name: Run Tests
      run: go test -v ./...

    - name: Build Project
      run: go build -v ./cmd/chat/main.go